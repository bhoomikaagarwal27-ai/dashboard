<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajsha Chemicals — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555c70;
  --green:#22c97a;--red:#f04f4f;--amber:#f5a623;
  --blue:#4e9eff;--purple:#a78bfa;--teal:#2dd4bf;
  --accent:#4e9eff;--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:rgba(78,158,255,0.12);border:1px solid rgba(78,158,255,0.3);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:15px;font-weight:600;}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.live-badge{background:rgba(34,201,122,0.15);border:1px solid rgba(34,201,122,0.3);color:var(--green);font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.clock{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);}
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.view-btn{padding:6px 14px;font-size:12px;font-family:'DM Sans',sans-serif;background:transparent;border:none;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.view-btn.active{background:var(--accent);color:#fff;font-weight:500;}
.dept-tabs{padding:14px 20px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.dept-tabs::-webkit-scrollbar{display:none;}
.dept-tab{padding:8px 14px;font-size:12px;font-weight:500;border:1px solid transparent;border-radius:var(--radius-sm) var(--radius-sm) 0 0;cursor:pointer;white-space:nowrap;transition:all 0.2s;color:var(--text2);background:transparent;font-family:'DM Sans',sans-serif;border-bottom:none;margin-bottom:-1px;}
.dept-tab.active{background:var(--bg2);border-color:var(--border);border-bottom-color:var(--bg2);color:var(--text);}
.dept-tab:hover:not(.active){color:var(--text);background:var(--bg3);}
.main{padding:20px;max-width:1200px;margin:0 auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.kpi-val{font-size:26px;font-weight:600;line-height:1;margin-bottom:4px;}
.kpi-unit{font-size:13px;font-weight:400;color:var(--text2);}
.kpi-trend{font-size:11px;margin-top:6px;}
.kpi-trend.good{color:var(--green);}
.kpi-trend.bad{color:var(--red);}
.kpi-trend.warn{color:var(--amber);}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.chart-card.full{grid-column:1/-1;}
.chart-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-name{font-size:12px;color:var(--text2);min-width:90px;}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-pct{font-size:12px;font-weight:500;min-width:36px;text-align:right;font-family:'DM Mono',monospace;}
.sparkline-wrap{height:70px;display:flex;align-items:flex-end;gap:4px;}
.spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;}
.spark-labels{display:flex;justify-content:space-between;margin-top:6px;}
.spark-label{font-size:10px;color:var(--text3);flex:1;text-align:center;}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid;font-size:13px;margin-bottom:8px;}
.alert-item.green{background:rgba(34,201,122,0.12);border-color:rgba(34,201,122,0.2);}
.alert-item.red{background:rgba(240,79,79,0.12);border-color:rgba(240,79,79,0.2);}
.alert-item.amber{background:rgba(245,166,35,0.12);border-color:rgba(245,166,35,0.2);}
.alert-dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.form-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.form-title{font-size:14px;font-weight:600;}
.form-deadline{font-size:11px;color:var(--amber);background:rgba(245,166,35,0.12);padding:3px 10px;border-radius:20px;border:1px solid rgba(245,166,35,0.2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;color:var(--text2);font-weight:500;}
.finput{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;width:100%;}
.finput:focus{border-color:var(--accent);}
.finput::placeholder{color:var(--text3);}
.ftextarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;min-height:80px;resize:vertical;transition:border-color 0.2s;}
.ftextarea:focus{border-color:var(--accent);}
.fselect{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.submit-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s;margin-top:4px;}
.submit-btn:hover{opacity:0.85;}
.senior-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px;}
.senior-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.senior-dept-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.senior-dept-name{font-size:13px;font-weight:600;}
.status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.status-pill.good{background:rgba(34,201,122,0.12);color:var(--green);border:1px solid rgba(34,201,122,0.25);}
.status-pill.warn{background:rgba(245,166,35,0.12);color:var(--amber);border:1px solid rgba(245,166,35,0.25);}
.status-pill.bad{background:rgba(240,79,79,0.12);color:var(--red);border:1px solid rgba(240,79,79,0.25);}
.senior-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.senior-name{font-size:12px;color:var(--text2);}
.senior-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;}
.date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.date-text{font-size:13px;color:var(--text2);}
.date-day{font-size:20px;font-weight:600;}
.fp-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.fp-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#ff6b35;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.fp-ttl::after{content:'';flex:1;height:1px;background:rgba(255,107,53,0.2);}
.fp-note{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:var(--radius-sm);padding:8px 12px;border-left:3px solid #ff6b35;margin-bottom:14px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ff{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:11px;color:var(--text2);font-weight:500;line-height:1.3;}
.fsub{font-size:10px;color:var(--text3);}
.fpin{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color 0.2s;}
.fpin:focus{border-color:#ff6b35;}
.fpsel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.fp-sub-btn{background:#ff6b35;color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s;margin-top:6px;}
.fp-sub-btn:hover{opacity:0.85;}
.fp-month{font-size:12px;font-weight:600;color:#ff6b35;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);padding:4px 12px;border-radius:20px;}
.sx{overflow-x:auto;border-radius:var(--radius-sm);}
.fp-log{width:100%;border-collapse:collapse;font-size:11px;min-width:900px;}
.fp-log th{background:var(--bg3);color:var(--text2);padding:7px 8px;text-align:center;font-weight:500;border:1px solid var(--border);white-space:nowrap;}
.fp-log td{padding:6px 8px;text-align:center;border:1px solid var(--border);}
.fp-log tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.mp-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.mp-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#c084fc;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.mp-ttl::after{content:'';flex:1;height:1px;background:rgba(192,132,252,0.2);}
.mp-note{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:var(--radius-sm);padding:8px 12px;border-left:3px solid #c084fc;margin-bottom:14px;}
.shift-tabs{display:flex;gap:6px;margin-bottom:0;}
.shift-btn{padding:6px 16px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.shift-btn.active{background:rgba(192,132,252,0.15);border-color:rgba(192,132,252,0.4);color:#c084fc;}
.mp-sub-btn{background:#c084fc;color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s;margin-top:6px;}
.mp-sub-btn:hover{opacity:0.85;}
.mpt{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
.mpt th{background:var(--bg3);color:var(--text2);padding:8px 8px;text-align:center;font-weight:500;border:1px solid var(--border);white-space:nowrap;font-size:11px;}
.mpt th.dl{text-align:left;min-width:120px;}
.mpt td{padding:5px 6px;border:1px solid var(--border);text-align:center;vertical-align:middle;}
.mpt td.dn{text-align:left;font-weight:500;white-space:nowrap;font-size:12px;}
.mpt td.rc{color:#c084fc;font-weight:600;font-family:'DM Mono',monospace;background:rgba(192,132,252,0.05);}
.mpt td.tc{font-weight:600;font-family:'DM Mono',monospace;}
.dp{color:var(--green);font-weight:600;font-family:'DM Mono',monospace;}
.dn2{color:var(--red);font-weight:600;font-family:'DM Mono',monospace;}
.dz{color:var(--text3);font-family:'DM Mono',monospace;}
.mpt tr.gt td{background:var(--bg3);font-weight:600;border-top:2px solid var(--border2);}
.mpt tr:hover td{background:rgba(255,255,255,0.02);}
.msm{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 7px;font-size:12px;color:var(--text);font-family:'DM Mono',monospace;outline:none;width:62px;text-align:center;transition:border-color 0.2s;}
.msm:focus{border-color:#c084fc;}
.cpill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;display:inline-block;margin:2px;}
.edit-btn{font-size:11px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--bg3);}
.edit-btn.on{background:rgba(192,132,252,0.2);border-color:rgba(192,132,252,0.5);color:#c084fc;}
.mp-log{width:100%;border-collapse:collapse;font-size:11px;min-width:600px;}
.mp-log th{background:var(--bg3);color:var(--text2);padding:6px 10px;text-align:center;font-weight:500;border:1px solid var(--border);}
.mp-log td{padding:5px 10px;text-align:center;border:1px solid var(--border);}
.mp-log tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.sp-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.sp-tbl th{background:var(--bg3);color:var(--text2);padding:8px 10px;text-align:center;border:1px solid var(--border);font-size:11px;white-space:nowrap;}
.sp-tbl th.tl{text-align:left;}
.sp-tbl td{padding:8px 8px;border:1px solid var(--border);text-align:center;vertical-align:middle;}
.sp-tbl td.nl{text-align:left;font-weight:600;padding:10px 12px;white-space:nowrap;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
/* FORMALDEHYDE PLANT */
.fhd-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.fhd-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#f97316;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.fhd-ttl::after{content:'';flex:1;height:1px;background:rgba(249,115,22,0.2);}
.fhd-note{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:var(--radius-sm);padding:8px 12px;border-left:3px solid #f97316;margin-bottom:14px;}
.fhd-grid{display:grid;gap:10px;}
.fhd-2{grid-template-columns:1fr 1fr;}
.fhd-3{grid-template-columns:1fr 1fr 1fr;}
.fhd-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fhd-field{display:flex;flex-direction:column;gap:5px;}
.fhd-label{font-size:11px;color:var(--text2);font-weight:500;line-height:1.4;}
.fhd-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.fhd-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color 0.2s;}
.fhd-input:focus{border-color:#f97316;}
.fhd-input::placeholder{color:var(--text3);}
.fhd-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;}
.fhd-sub-btn{background:#f97316;color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s;margin-top:6px;}
.fhd-sub-btn:hover{opacity:0.85;}
.fhd-month{font-size:12px;font-weight:600;color:#f97316;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.25);padding:4px 12px;border-radius:20px;}
.fhd-log{width:100%;border-collapse:collapse;font-size:11px;min-width:700px;}
.fhd-log th{background:var(--bg3);color:var(--text2);padding:7px 10px;text-align:center;font-weight:500;border:1px solid var(--border);white-space:nowrap;}
.fhd-log td{padding:6px 10px;text-align:center;border:1px solid var(--border);}
.fhd-log tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;}
.sb-good{background:rgba(34,201,122,0.15);color:var(--green);}
.sb-warn{background:rgba(245,166,35,0.15);color:var(--amber);}
.sb-bad{background:rgba(240,79,79,0.15);color:var(--red);}
@media(max-width:600px){.fhd-2,.fhd-3,.fhd-4{grid-template-columns:1fr 1fr;}.fhd-sec{padding:14px;}}
.prod-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.prod-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.prod-ttl::after{content:'';flex:1;height:1px;background:rgba(78,158,255,0.2);}
.prod-note{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:var(--radius-sm);padding:8px 12px;border-left:3px solid var(--blue);margin-bottom:14px;}
.prod-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.prod-tbl th{background:var(--bg3);color:var(--text2);padding:8px 12px;text-align:left;font-weight:500;border:1px solid var(--border);font-size:11px;white-space:nowrap;}
.prod-tbl th.ctr{text-align:center;}
.prod-tbl td{padding:6px 10px;border:1px solid var(--border);vertical-align:middle;}
.prod-tbl td.pname{font-weight:500;color:var(--text);}
.prod-tbl td.pname-edit{padding:4px 6px;}
.prod-tbl tr:nth-child(even) td{background:rgba(255,255,255,0.015);}
.prod-tbl tr:hover td{background:rgba(255,255,255,0.03);}
.prod-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);font-family:'DM Mono',monospace;outline:none;width:100%;text-align:center;transition:border-color 0.2s;}
.prod-input:focus{border-color:var(--blue);}
.prod-name-input{background:var(--bg3);border:1px solid rgba(78,158,255,0.3);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--blue);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color 0.2s;}
.prod-name-input:focus{border-color:var(--blue);}
.plant-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(78,158,255,0.12);color:var(--blue);border:1px solid rgba(78,158,255,0.25);display:inline-block;margin-bottom:10px;}
.prod-edit-btn{font-size:11px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--bg3);}
.prod-edit-btn.on{background:rgba(78,158,255,0.15);border-color:rgba(78,158,255,0.4);color:var(--blue);}
.prod-sub-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s;margin-top:6px;}
.prod-sub-btn:hover{opacity:0.85;}
.prod-log{width:100%;border-collapse:collapse;font-size:11px;min-width:500px;}
.prod-log th{background:var(--bg3);color:var(--text2);padding:6px 10px;text-align:center;font-weight:500;border:1px solid var(--border);}
.prod-log td{padding:5px 10px;text-align:center;border:1px solid var(--border);}
.prod-log tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
@media(max-width:600px){
  .chart-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .g4{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
}

/* ── LOGIN OVERLAY ── */

<script>
// ═══════════════════════════════════════════════
// DEPARTMENT ACCESS CODES
// Share each code ONLY with the relevant staff
// Change codes anytime by editing this section
// ═══════════════════════════════════════════════
var DEPT_CODES = {
  'production':   'PROD2024',
  'quality':      'QUAL2024',
  'safety':       'SAFE2024',
  'inventory':    'INVT2024',
  'finance':      'FINC2024',
  'dispatch':     'DISP2024',
  'formaldehyde': 'FHDT2024',
  'firepump':     'FPMP2024',
  'manpower':     'HRMP2024',
  'senior':       'SNRV2024'
};

var DEPT_INDEX = {
  'production':0,'quality':1,'safety':2,'inventory':3,
  'finance':4,'dispatch':5,'formaldehyde':6,'firepump':7,'manpower':8
};

var selectedDept = null;

function selDept(id, btn) {
  selectedDept = id;
  document.querySelectorAll('.login-dept-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  var names = {
    'production':'Production','quality':'Quality / Lab','safety':'Safety / EHS',
    'inventory':'Inventory','finance':'Finance','dispatch':'Dispatch',
    'formaldehyde':'Formaldehyde Plant','firepump':'Fire Pump House',
    'manpower':'HR / Manpower','senior':'Senior Management'
  };
  document.getElementById('passLabel').textContent = 'Enter access code for ' + (names[id]||id);
  document.getElementById('loginPass').focus();
  loginErr('');
}

function loginErr(msg) {
  document.getElementById('loginErr').textContent = msg;
  if(msg) {
    var inp = document.getElementById('loginPass');
    inp.classList.add('error');
    setTimeout(function(){inp.classList.remove('error');},400);
  }
}

function doLogin() {
  if(!selectedDept) { loginErr('Please select your department first'); return; }
  var entered = document.getElementById('loginPass').value.trim().toUpperCase();
  var correct = (DEPT_CODES[selectedDept]||'').toUpperCase();
  if(!entered) { loginErr('Please enter your access code'); return; }
  if(entered !== correct) { loginErr('Incorrect access code. Please try again.'); document.getElementById('loginPass').value=''; return; }

  // Correct — grant access
  var ov = document.getElementById('loginOverlay');
  ov.style.opacity='0';
  ov.style.transition='opacity 0.4s';
  setTimeout(function(){ov.style.display='none';},400);

  // Set the correct view and department
  if(selectedDept === 'senior') {
    // Senior view — show all departments, switch to senior view
    setTimeout(function(){
      var senBtn = document.querySelector('.view-btn:last-child');
      if(senBtn) { curView='senior'; senBtn.classList.add('active'); document.querySelector('.view-btn').classList.remove('active'); render(); }
      // Hide Staff/Senior toggle from seniors — they only see senior view
      document.querySelector('.view-toggle').style.display='none';
      // Hide dept tabs
      document.getElementById('dept-tabs').style.display='none';
    },450);
  } else {
    // Staff — jump directly to their department, hide other tabs
    setTimeout(function(){
      var dIdx = DEPT_INDEX[selectedDept];
      if(dIdx !== undefined) { curDept = dIdx; }
      curView = 'staff';
      render();
      // Show only their tab — hide others
      lockTabs(selectedDept);
      // Hide Senior button from staff
      document.querySelector('.view-toggle').style.display='none';
    },450);
  }
}

function lockTabs(allowedDept) {
  // Rebuild tabs showing only the allowed department
  var h='';
  DEPTS.forEach(function(d,i){
    if(d.id===allowedDept){
      h+='<button class="dept-tab active" onclick="sw('+i+')">'+d.name+'</button>';
    }
    // All other tabs hidden
  });
  document.getElementById('dept-tabs').innerHTML=h;
}

</script>

function calcFhdRatio(){
  var prod=parseFloat((el('fhd_fa_prod')||{}).value)||0;
  var cons=parseFloat((el('fhd_me_consumption')||{}).value)||0;
  var re=el('fhd_ratio');
  if(re&&re.textContent!==undefined){
    re.textContent=(prod>0&&cons>0)?(Math.round((prod/cons)*1000)/1000).toFixed(3):'—';
  }
}

function subProduction(){
  var n=new Date();
  var plants=getProdPlants();
  var totalProjection=0,totalPlan=0,totalQty=0,totalDispatch=0;
  var fieldValues={};
  var prodSheetData={};

  plants.forEach(function(plant){
    plant.products.forEach(function(prod,ri){
      var pKey=plant.id+'_'+ri;
      var proj=parseFloat((el('prd_'+pKey+'_projection')).value)||0;
      var plan=parseFloat((el('prd_'+pKey+'_plan')).value)||0;
      var qty=parseFloat((el('prd_'+pKey+'_qty')).value)||0;
      var disp=parseFloat((el('prd_'+pKey+'_dispatch')).value)||0;
      var rem=(el('prd_'+pKey+'_remark')).value||'';
      totalProjection+=proj;totalPlan+=plan;totalQty+=qty;totalDispatch+=disp;
      if(proj||plan||qty||disp||rem){
        fieldValues[pKey]={name:prod,projection:proj,plan:plan,qty:qty,dispatch:disp,remark:rem};
        // Add to sheet data with proper labels
        var label=prod;
        prodSheetData[label+' - Projection(kg)']=proj||0;
        prodSheetData[label+' - Plan(kg)']=plan||0;
        prodSheetData[label+' - Production Qty(kg)']=qty||0;
        prodSheetData[label+' - Dispatch Qty(kg)']=disp||0;
        if(rem) prodSheetData[label+' - Remark']=rem;
      }
    });
  });

  var dateStr=n.getDate()+'-'+MN[n.getMonth()]+'-'+n.getFullYear();
  var downtime=(el('prod_downtime')).value||'0';
  var dtReason=(el('prod_downtime_reason')).value||'';
  var status=(el('prod_status')).value||'On track';
  var notes=(el('prod_notes')).value||'';

  // Build alerts based on plan vs actual
  var alerts=[];
  plants.forEach(function(plant){
    plant.products.forEach(function(prod,ri){
      var pKey=plant.id+'_'+ri;
      var fv=fieldValues[pKey];
      if(!fv) return;
      if(fv.plan>0&&fv.qty<fv.plan){
        var gap=Math.round((fv.plan-fv.qty)*10)/10;
        var pct=Math.round((fv.qty/fv.plan)*100);
        alerts.push({product:prod,plan:fv.plan,actual:fv.qty,gap:gap,pct:pct,type:pct<50?'red':'amber'});
      }
    });
  });

  // Save to dashboard memory
  var row={
    key:n.getDate()+'-'+(n.getMonth()+1)+'-'+n.getFullYear(),
    date:dateStr,
    totalProjection:Math.round(totalProjection*10)/10,
    totalPlan:Math.round(totalPlan*10)/10,
    totalQty:Math.round(totalQty*10)/10,
    totalDispatch:Math.round(totalDispatch*10)/10,
    downtime:downtime,
    downtime_reason:dtReason,
    status:status,
    notes:notes,
    reportedAt:getTm(),
    data:fieldValues,
    alerts:alerts
  };
  if(!SD['prod_log'])SD['prod_log']=[];
  SD['prod_log']=SD['prod_log'].filter(function(r){return r.key!==row.key;});
  SD['prod_log'].unshift(row);

  // Update KPI cards and senior summary
  SD['production']={submitted:true,totalQty:row.totalQty,totalPlan:row.totalPlan,status:status,date:dateStr,alerts:alerts};
  var d=DEPTS.find(function(x){return x.id==='production';});
  if(d){
    d.kpis[0].v=row.totalQty+' kg';d.kpis[0].lb='Total Production';d.kpis[0].t='Plan: '+row.totalPlan+' kg';
    d.kpis[1].v=row.totalDispatch+' kg';d.kpis[1].lb='Total Dispatch';d.kpis[1].t='Dispatched today';
    d.kpis[2].v=row.totalProjection+' kg';d.kpis[2].lb='Total Projection';d.kpis[2].t='Expected output';
    d.kpis[3].v=alerts.length;d.kpis[3].lb='Alerts';d.kpis[3].u='products below plan';
    d.kpis[3].tr=alerts.length===0?'good':alerts.some(function(a){return a.type==='red';})?'bad':'warn';
    d.sm[0].v=row.totalQty+' kg produced';
    d.sm[1].v=row.totalDispatch+' kg dispatched';
    d.sm[2].v=row.totalPlan+' kg planned';
    d.sm[3].v=status;
    d.ss=status==='On track'?'good':status==='Critical delay'?'bad':'warn';
    // Store alerts for senior view
    d.alerts=d.alerts.filter(function(a){return a.tp==='green';});
    alerts.forEach(function(a){
      d.alerts.unshift({tp:a.type,m:a.product+': Plan '+a.plan+' kg — Actual '+a.actual+' kg ('+a.pct+'% achieved, gap: '+a.gap+' kg)'});
    });
    if(notes) d.alerts.unshift({tp:'green',m:'Notes: '+notes});
  }

  // Sync to Google Sheets — complete data with all columns
  var gsData={
    date:dateStr,
    at:getTm(),
    'Total Projection(kg)':row.totalProjection,
    'Total Production Plan(kg)':row.totalPlan,
    'Total Production Qty(kg)':row.totalQty,
    'Total Dispatch Qty(kg)':row.totalDispatch,
    'Overall Status':status,
    'Machine Downtime(hrs)':downtime,
    'Downtime Reason':dtReason,
    'Notes':notes,
    'Alerts Count':alerts.length
  };
  // Add all product columns
  Object.keys(prodSheetData).forEach(function(k){gsData[k]=prodSheetData[k];});
  syncToSheets('Production',gsData,function(ok){showSyncResult(ok,'Production');});

  showProdPopup(dateStr,row.totalQty,row.totalPlan,row.totalProjection,row.totalDispatch,downtime,dtReason,status,fieldValues,alerts,notes);
  setTimeout(renderProduction,500);
}

function subProduction(){
  var n=new Date();
  var plants=getProdPlants();
  var totalProjection=0,totalPlan=0,totalQty=0,totalDispatch=0;
  var fieldValues={};
  var prodSheetData={};

  plants.forEach(function(plant){
    plant.products.forEach(function(prod,ri){
      var pKey=plant.id+'_'+ri;
      var proj=parseFloat((el('prd_'+pKey+'_projection')).value)||0;
      var plan=parseFloat((el('prd_'+pKey+'_plan')).value)||0;
      var qty=parseFloat((el('prd_'+pKey+'_qty')).value)||0;
      var disp=parseFloat((el('prd_'+pKey+'_dispatch')).value)||0;
      var rem=(el('prd_'+pKey+'_remark')).value||'';
      totalProjection+=proj;totalPlan+=plan;totalQty+=qty;totalDispatch+=disp;
      if(proj||plan||qty||disp||rem){
        fieldValues[pKey]={name:prod,projection:proj,plan:plan,qty:qty,dispatch:disp,remark:rem};
        // Add to sheet data with proper labels
        var label=prod;
        prodSheetData[label+' - Projection(kg)']=proj||0;
        prodSheetData[label+' - Plan(kg)']=plan||0;
        prodSheetData[label+' - Production Qty(kg)']=qty||0;
        prodSheetData[label+' - Dispatch Qty(kg)']=disp||0;
        if(rem) prodSheetData[label+' - Remark']=rem;
      }
    });
  });

  var dateStr=n.getDate()+'-'+MN[n.getMonth()]+'-'+n.getFullYear();
  var downtime=(el('prod_downtime')).value||'0';
  var dtReason=(el('prod_downtime_reason')).value||'';
  var status=(el('prod_status')).value||'On track';
  var notes=(el('prod_notes')).value||'';

  // Build alerts based on plan vs actual
  var alerts=[];
  plants.forEach(function(plant){
    plant.products.forEach(function(prod,ri){
      var pKey=plant.id+'_'+ri;
      var fv=fieldValues[pKey];
      if(!fv) return;
      if(fv.plan>0&&fv.qty<fv.plan){
        var gap=Math.round((fv.plan-fv.qty)*10)/10;
        var pct=Math.round((fv.qty/fv.plan)*100);
        alerts.push({product:prod,plan:fv.plan,actual:fv.qty,gap:gap,pct:pct,type:pct<50?'red':'amber'});
      }
    });
  });

  // Save to dashboard memory
  var row={
    key:n.getDate()+'-'+(n.getMonth()+1)+'-'+n.getFullYear(),
    date:dateStr,
    totalProjection:Math.round(totalProjection*10)/10,
    totalPlan:Math.round(totalPlan*10)/10,
    totalQty:Math.round(totalQty*10)/10,
    totalDispatch:Math.round(totalDispatch*10)/10,
    downtime:downtime,
    downtime_reason:dtReason,
    status:status,
    notes:notes,
    reportedAt:getTm(),
    data:fieldValues,
    alerts:alerts
  };
  if(!SD['prod_log'])SD['prod_log']=[];
  SD['prod_log']=SD['prod_log'].filter(function(r){return r.key!==row.key;});
  SD['prod_log'].unshift(row);

  // Update KPI cards and senior summary
  SD['production']={submitted:true,totalQty:row.totalQty,totalPlan:row.totalPlan,status:status,date:dateStr,alerts:alerts};
  var d=DEPTS.find(function(x){return x.id==='production';});
  if(d){
    d.kpis[0].v=row.totalQty+' kg';d.kpis[0].lb='Total Production';d.kpis[0].t='Plan: '+row.totalPlan+' kg';
    d.kpis[1].v=row.totalDispatch+' kg';d.kpis[1].lb='Total Dispatch';d.kpis[1].t='Dispatched today';
    d.kpis[2].v=row.totalProjection+' kg';d.kpis[2].lb='Total Projection';d.kpis[2].t='Expected output';
    d.kpis[3].v=alerts.length;d.kpis[3].lb='Alerts';d.kpis[3].u='products below plan';
    d.kpis[3].tr=alerts.length===0?'good':alerts.some(function(a){return a.type==='red';})?'bad':'warn';
    d.sm[0].v=row.totalQty+' kg produced';
    d.sm[1].v=row.totalDispatch+' kg dispatched';
    d.sm[2].v=row.totalPlan+' kg planned';
    d.sm[3].v=status;
    d.ss=status==='On track'?'good':status==='Critical delay'?'bad':'warn';
    // Store alerts for senior view
    d.alerts=d.alerts.filter(function(a){return a.tp==='green';});
    alerts.forEach(function(a){
      d.alerts.unshift({tp:a.type,m:a.product+': Plan '+a.plan+' kg — Actual '+a.actual+' kg ('+a.pct+'% achieved, gap: '+a.gap+' kg)'});
    });
    if(notes) d.alerts.unshift({tp:'green',m:'Notes: '+notes});
  }

  // Sync to Google Sheets — complete data with all columns
  var gsData={
    date:dateStr,
    at:getTm(),
    'Total Projection(kg)':row.totalProjection,
    'Total Production Plan(kg)':row.totalPlan,
    'Total Production Qty(kg)':row.totalQty,
    'Total Dispatch Qty(kg)':row.totalDispatch,
    'Overall Status':status,
    'Machine Downtime(hrs)':downtime,
    'Downtime Reason':dtReason,
    'Notes':notes,
    'Alerts Count':alerts.length
  };
  // Add all product columns
  Object.keys(prodSheetData).forEach(function(k){gsData[k]=prodSheetData[k];});
  syncToSheets('Production',gsData,function(ok){showSyncResult(ok,'Production');});

  showProdPopup(dateStr,row.totalQty,row.totalPlan,row.totalProjection,row.totalDispatch,downtime,dtReason,status,fieldValues,alerts,notes);
  setTimeout(renderProduction,500);
}

function updMP2(){
  var GReq=0,GAct=0;
  MPD.forEach(function(dept){
    var dkey=dk(dept);
    var rGd=gReq(dept,'gujarat','day'),rGn=gReq(dept,'gujarat','night');
    var rPd=gReq(dept,'paramount','day'),rPn=gReq(dept,'paramount','night');
    var rYd=gReq(dept,'yash','day'),rYn=gReq(dept,'yash','night');
    var rYOd=gReq(dept,'yogi','day'),rYOn=gReq(dept,'yogi','night');
    var totReq=rGd+rGn+rPd+rPn+rYd+rYn+rYOd+rYOn;
    GReq+=totReq;
    var aGd=parseInt((el('ad_'+dkey+'_gujarat')).value||0)||0;
    var aGn=parseInt((el('an_'+dkey+'_gujarat')).value||0)||0;
    var aPd=parseInt((el('ad_'+dkey+'_paramount')).value||0)||0;
    var aPn=parseInt((el('an_'+dkey+'_paramount')).value||0)||0;
    var aYd=parseInt((el('ad_'+dkey+'_yash')).value||0)||0;
    var aYn=parseInt((el('an_'+dkey+'_yash')).value||0)||0;
    var aYOd=parseInt((el('ad_'+dkey+'_yogi')).value||0)||0;
    var aYOn=parseInt((el('an_'+dkey+'_yogi')).value||0)||0;
    var totAct=aGd+aGn+aPd+aPn+aYd+aYn+aYOd+aYOn;
    GAct+=totAct;
    var diff=totAct-totReq;
    var te=el('tot_'+dkey),de=el('dif_'+dkey);
    if(te.textContent!==undefined)te.textContent=totAct||'—';
    if(de.textContent!==undefined){de.textContent=(totReq>0||totAct>0)?diff:'—';de.className=diff>0?'dp':diff<0?'dn2':'dz';}
  });
  var GDiff=GAct-GReq;
  function upd(id,v){var e=el(id);if(e.textContent!==undefined)e.textContent=v;}
  upd('mg_tot',GAct);upd('mg_req',GReq);
  var gde=el('mg_dif');if(gde.textContent!==undefined){gde.textContent=GDiff;gde.className=GDiff>=0?'dp':'dn2';}
}

function lrqNew(inp){
  // inp.id format: rqd_deptkey_contractor OR rqn_deptkey_contractor
  var id=inp.id;
  var isNight=id.startsWith('rqn_');
  var rest=id.replace('rqd_','').replace('rqn_','');
  var parts=rest.split('_');
  var con=parts[parts.length-1];
  var dkeyPart=parts.slice(0,parts.length-1).join('_');
  var dept=MPD.find(function(d){return dk(d)===dkeyPart;})||dkeyPart;
  var val=parseInt(inp.value)||0;
  var reqs=getMR();
  if(!reqs[dept])reqs[dept]=JSON.parse(JSON.stringify(MPR0[dept]||{yogi:{day:0,night:0},paramount:{day:0,night:0},gujarat:{day:0,night:0},yash:{day:0,night:0}}));
  if(!reqs[dept][con])reqs[dept][con]={day:0,night:0};
  if(isNight){reqs[dept][con].night=val;}else{reqs[dept][con].day=val;}
  setMR(reqs);
  updMP2();
}

function lrq2(inp){
  // inp.id format: rq_deptkey_contractor
  var parts=inp.id.replace('rq_','').split('_');
  var con=parts[parts.length-1];
  var dkeyPart=parts.slice(0,parts.length-1).join('_');
  // Find dept name from dkey
  var dept=MPD.find(function(d){return dk(d)===dkeyPart;})||dkeyPart;
  var val=parseInt(inp.value)||0;
  var reqs=getMR();
  if(!reqs[dept])reqs[dept]=JSON.parse(JSON.stringify(MPR0[dept]||{yogi:{day:0,night:0},paramount:{day:0,night:0},gujarat:{day:0,night:0},yash:{day:0,night:0}}));
  if(!reqs[dept][con])reqs[dept][con]={day:0,night:0};
  reqs[dept][con]['day']=val;
  reqs[dept][con]['night']=val;
  setMR(reqs);
  updMP2();
}

function calcSp(){
  var pairs=[
    {aid:'sp_yd',did:'sp_yd_d',req:gConSum('yogi','day')},
    {aid:'sp_yn',did:'sp_yn_d',req:gConSum('yogi','night')},
    {aid:'sp_pd',did:'sp_pd_d',req:gConSum('paramount','day')},
    {aid:'sp_pn',did:'sp_pn_d',req:gConSum('paramount','night')}
  ];
  pairs.forEach(function(p){
    var actual=parseInt((el(p.aid)).value||0)||0,diff=actual-p.req;
    var e2=el(p.did);if(e2.textContent!==undefined){e2.textContent=diff===0?'0':diff>0?'+'+diff:String(diff);e2.style.color=diff>=0?'var(--green)':'var(--red)';}
  });
}

function subMP(){
  var n=new Date();
  var dateStr=n.getDate()+'-'+MN[n.getMonth()]+'-'+n.getFullYear();
  var keyD=n.getDate()+'-'+(n.getMonth()+1)+'-'+n.getFullYear()+'_day';
  var keyN=n.getDate()+'-'+(n.getMonth()+1)+'-'+n.getFullYear()+'_night';
  var gReqT=0,gG=0,gP=0,gY=0,gYO=0;
  var deptDataD={},deptDataN={};

  MPD.forEach(function(dept){
    var dkey=dk(dept);
    // Day actuals
    var gd=parseInt((el('ad_'+dkey+'_gujarat')).value||0)||0;
    var pd2=parseInt((el('ad_'+dkey+'_paramount')).value||0)||0;
    var yd=parseInt((el('ad_'+dkey+'_yash')).value||0)||0;
    var yod=parseInt((el('ad_'+dkey+'_yogi')).value||0)||0;
    deptDataD[dept]={gujarat:gd,paramount:pd2,yash:yd,yogi:yod};
    // Night actuals
    var gn=parseInt((el('an_'+dkey+'_gujarat')).value||0)||0;
    var pn=parseInt((el('an_'+dkey+'_paramount')).value||0)||0;
    var yn=parseInt((el('an_'+dkey+'_yash')).value||0)||0;
    var yon=parseInt((el('an_'+dkey+'_yogi')).value||0)||0;
    deptDataN[dept]={gujarat:gn,paramount:pn,yash:yn,yogi:yon};
    // Combined totals
    gG+=gd+gn;gP+=pd2+pn;gY+=yd+yn;gYO+=yod+yon;
    gReqT+=(gReq(dept,'gujarat','day')+gReq(dept,'gujarat','night'))+(gReq(dept,'paramount','day')+gReq(dept,'paramount','night'))+(gReq(dept,'yash','day')+gReq(dept,'yash','night'))+(gReq(dept,'yogi','day')+gReq(dept,'yogi','night'));
  });

  var grandTotal=gG+gP+gY+gYO;
  var rb=(el('mp_rb')).value||'-';
  var rmk=(el('mp_rmk')).value||'';

  // Calculate Day/Night requirement totals (needed for sheet sync)
  var GRD=0,GRN=0;
  MPD.forEach(function(dept){
    GRD+=(gReq(dept,'gujarat','day')+gReq(dept,'paramount','day')+gReq(dept,'yash','day')+gReq(dept,'yogi','day'));
    GRN+=(gReq(dept,'gujarat','night')+gReq(dept,'paramount','night')+gReq(dept,'yash','night')+gReq(dept,'yogi','night'));
  });
  // Calculate Day/Night actual totals from collected data
  var GActD=0,GActN=0;
  MPD.forEach(function(dept){
    var dkey=dk(dept);
    GActD+=parseInt((el('ad_'+dkey+'_gujarat')).value||0)||0;
    GActD+=parseInt((el('ad_'+dkey+'_paramount')).value||0)||0;
    GActD+=parseInt((el('ad_'+dkey+'_yash')).value||0)||0;
    GActD+=parseInt((el('ad_'+dkey+'_yogi')).value||0)||0;
    GActN+=parseInt((el('an_'+dkey+'_gujarat')).value||0)||0;
    GActN+=parseInt((el('an_'+dkey+'_paramount')).value||0)||0;
    GActN+=parseInt((el('an_'+dkey+'_yash')).value||0)||0;
    GActN+=parseInt((el('an_'+dkey+'_yogi')).value||0)||0;
  });

  // Save Day row
  var rowD={key:keyD,date:dateStr,shift:'Day Shift',grandReq:gReqT,grandGuj:gG,grandPara:gP,grandYash:gY,grandYogi:gYO,grandTotal:grandTotal,reportedBy:rb,remarks:rmk,data:deptDataD};
  // Save Night row
  var rowN={key:keyN,date:dateStr,shift:'Night Shift',grandReq:gReqT,grandGuj:gG,grandPara:gP,grandYash:gY,grandYogi:gYO,grandTotal:grandTotal,reportedBy:rb,remarks:rmk,data:deptDataN};

  if(!SD['mp_log'])SD['mp_log']=[];
  SD['mp_log']=SD['mp_log'].filter(function(r){return r.key!==keyD&&r.key!==keyN;});
  SD['mp_log'].unshift(rowN);
  SD['mp_log'].unshift(rowD);

  SD['manpower']={submitted:true,reportedBy:rb,date:dateStr,total:grandTotal,diff:grandTotal-gReqT};

  // Update dept KPIs
  var d=DEPTS.find(function(x){return x.id==='manpower';});
  if(d){
    d.kpis[0].v=gReqT;d.kpis[1].v=grandTotal;
    d.kpis[2].v=grandTotal-gReqT;
    d.sm[0].v=String(gReqT);d.sm[1].v=String(grandTotal);
    d.sm[2].v=String(grandTotal-gReqT)+' workers';
    d.ss=grandTotal>=gReqT?'good':grandTotal<gReqT*0.8?'bad':'warn';
  }

  // Sync to Google Sheets — send ALL detailed data per department per contractor
  var mpSheetData={
    date:dateStr,
    at:getTm(),
    reportedBy:rb,
    remarks:rmk,
    totalRequirement:gReqT,
    totalPresent:grandTotal,
    difference:grandTotal-gReqT,
    gujaratTotal:gG,
    paramountTotal:gP,
    yashTotal:gY,
    yogiTotal:gYO,
    dayShiftReq:GRD,
    nightShiftReq:GRN,
    dayShiftActual:GActD,
    nightShiftActual:GActN
  };
  // Add per-department breakdown
  MPD.forEach(function(dept){
    var dkey=dk(dept);
    var aGd=parseInt((el('ad_'+dkey+'_gujarat')).value||0)||0;
    var aGn=parseInt((el('an_'+dkey+'_gujarat')).value||0)||0;
    var aPd=parseInt((el('ad_'+dkey+'_paramount')).value||0)||0;
    var aPn=parseInt((el('an_'+dkey+'_paramount')).value||0)||0;
    var aYd=parseInt((el('ad_'+dkey+'_yash')).value||0)||0;
    var aYn=parseInt((el('an_'+dkey+'_yash')).value||0)||0;
    var aYOd=parseInt((el('ad_'+dkey+'_yogi')).value||0)||0;
    var aYOn=parseInt((el('an_'+dkey+'_yogi')).value||0)||0;
    var dTotal=aGd+aGn+aPd+aPn+aYd+aYn+aYOd+aYOn;
    var rGd=gReq(dept,'gujarat','day'),rGn=gReq(dept,'gujarat','night');
    var rPd=gReq(dept,'paramount','day'),rPn=gReq(dept,'paramount','night');
    var rYd=gReq(dept,'yash','day'),rYn=gReq(dept,'yash','night');
    var rYOd=gReq(dept,'yogi','day'),rYOn=gReq(dept,'yogi','night');
    var dReq=rGd+rGn+rPd+rPn+rYd+rYn+rYOd+rYOn;
    // Only include departments that have requirements or actual data
    if(dReq>0||dTotal>0){
      mpSheetData[dept+'_Requirement']=dReq;
      mpSheetData[dept+'_Gujarat_Day']=aGd;
      mpSheetData[dept+'_Gujarat_Night']=aGn;
      mpSheetData[dept+'_Paramount_Day']=aPd;
      mpSheetData[dept+'_Paramount_Night']=aPn;
      mpSheetData[dept+'_Yash_Day']=aYd;
      mpSheetData[dept+'_Yash_Night']=aYn;
      mpSheetData[dept+'_Yogi_Day']=aYOd;
      mpSheetData[dept+'_Yogi_Night']=aYOn;
      mpSheetData[dept+'_Total_Present']=dTotal;
      mpSheetData[dept+'_Difference']=dTotal-dReq;
    }
  });
  syncToSheets('HR Manpower',mpSheetData,function(ok){showSyncResult(ok,'HR Manpower');});

  toast('Manpower report (Day + Night) submitted — management notified');
  setTimeout(renderMP,400);
}



// ── SENIOR ──
function renderSenior(){
  var h='',good=0,warn=0,bad=0,sub=0;
  DEPTS.forEach(function(d){
    if(d.ss==='good')good++;else if(d.ss==='warn')warn++;else bad++;
    var fpl=SD['fp_log'],mpl=SD['mp_log'],fhdl=SD['fhd_log'];
    var s=d.isFP?(fpl&&fpl.length>0):d.isMP?(mpl&&mpl.length>0):d.isFHD?(fhdl&&fhdl.length>0):!!SD[d.id];
    if(s)sub++;
  });
  h+='<div class="date-bar"><div><div class="date-text">Management overview</div><div class="date-day">'+getNow()+'</div></div><div style="font-size:12px;color:var(--text2);">All departments &middot; as of '+getTm()+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">';
  h+='<div class="kpi-card"><div class="kpi-label">On track</div><div class="kpi-val" style="color:var(--green);">'+good+'</div><div class="kpi-trend good">departments clear</div></div>';
  h+='<div class="kpi-card"><div class="kpi-label">Needs attention</div><div class="kpi-val" style="color:var(--amber);">'+warn+'</div><div class="kpi-trend warn">departments flagged</div></div>';
  h+='<div class="kpi-card"><div class="kpi-label">Critical</div><div class="kpi-val" style="color:var(--red);">'+bad+'</div><div class="kpi-trend bad">departments critical</div></div>';
  h+='<div class="kpi-card"><div class="kpi-label">EOD updates</div><div class="kpi-val">'+sub+'<span class="kpi-unit">/ 9</span></div><div class="kpi-trend warn">submitted today</div></div>';
  h+='</div><div class="senior-grid">';
  DEPTS.forEach(function(d){
    var fpl=SD['fp_log'],mpl=SD['mp_log'],fhdl=SD['fhd_log'];
    var isS=d.isFP?(fpl&&fpl.length>0):d.isMP?(mpl&&mpl.length>0):d.isFHD?(fhdl&&fhdl.length>0):!!SD[d.id];
    var slbl=isS?'<span style="font-size:10px;color:var(--text2);">Submitted today</span>':'<span style="font-size:10px;color:var(--text3);">Awaiting update</span>';
    var ptxt=d.ss==='good'?'On track':d.ss==='warn'?'Monitor':'Alert';
    h+='<div class="senior-card"><div class="senior-dept-hdr"><div class="senior-dept-name" style="color:'+d.acc+'">'+d.name+'</div>';
    h+='<div style="display:flex;align-items:center;gap:6px;">'+slbl+'<span class="status-pill '+d.ss+'">'+ptxt+'</span></div></div><div>';
    d.sm.forEach(function(m){h+='<div class="senior-row"><div class="senior-name">'+m.n+'</div><div class="senior-val">'+m.v+'</div></div>';});
    h+='</div></div>';
  });
  h+='</div>';
  // ── MANPOWER SHORTFALL ALERTS ──
  var mpLog=SD['mp_log']||[];
  var mpAlerts=[];
  if(mpLog.length>0){
    var latestD=null,latestN=null;
    mpLog.forEach(function(r){if(r.shift==='Day Shift'&&!latestD)latestD=r;if(r.shift==='Night Shift'&&!latestN)latestN=r;});
    var latest=latestD||latestN;
    if(latest){
      MPD.forEach(function(dept){
        var rGd=gReq(dept,'gujarat','day'),rGn=gReq(dept,'gujarat','night');
        var rPd=gReq(dept,'paramount','day'),rPn=gReq(dept,'paramount','night');
        var rYd=gReq(dept,'yash','day'),rYn=gReq(dept,'yash','night');
        var rYOd=gReq(dept,'yogi','day'),rYOn=gReq(dept,'yogi','night');
        var totReq=rGd+rGn+rPd+rPn+rYd+rYn+rYOd+rYOn;
        if(totReq===0) return;
        var preD=latestD?(latestD.data[dept]||{}):{};
        var preN=latestN?(latestN.data[dept]||{}):{};
        var aGd=parseInt(preD.gujarat||0)||0,aGn=parseInt(preN.gujarat||0)||0;
        var aPd=parseInt(preD.paramount||0)||0,aPn=parseInt(preN.paramount||0)||0;
        var aYd=parseInt(preD.yash||0)||0,aYn=parseInt(preN.yash||0)||0;
        var aYOd=parseInt(preD.yogi||0)||0,aYOn=parseInt(preN.yogi||0)||0;
        var totAct=aGd+aGn+aPd+aPn+aYd+aYn+aYOd+aYOn;
        var diff=totAct-totReq;
        if(diff<0) mpAlerts.push({dept:dept,req:totReq,actual:totAct,shortfall:diff});
      });
    }
  }
  if(mpAlerts.length>0){
    mpAlerts.sort(function(a,b){return a.shortfall-b.shortfall;});
    h+='<div class="chart-card full" style="background:var(--bg2);border:1px solid rgba(240,79,79,0.3);border-radius:var(--radius);padding:16px;margin-bottom:12px;">';
    h+='<div class="chart-title" style="color:var(--red);">Manpower shortfall alerts ('+mpAlerts.length+' departments)</div>';
    mpAlerts.forEach(function(a){
      var pct=Math.round((a.actual/a.req)*100);
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="min-width:140px;font-size:13px;font-weight:500;color:var(--text);">'+a.dept+'</div>';
      h+='<div style="flex:1;background:var(--bg3);border-radius:6px;height:8px;">';
      h+='<div style="width:'+Math.min(100,pct)+'%;background:'+(pct<50?'var(--red)':pct<80?'var(--amber)':'var(--green)')+';height:8px;border-radius:6px;"></div></div>';
      h+='<div style="min-width:80px;text-align:right;font-size:12px;font-family:DM Mono,monospace;color:var(--red);">'+a.actual+' / '+a.req+'</div>';
      h+='<div style="min-width:50px;text-align:right;font-size:12px;font-weight:600;color:var(--red);">'+a.shortfall+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // ── PRODUCTION PLAN vs ACTUAL ALERTS ──
  var prodLog=SD['prod_log']||[];
  if(prodLog.length>0&&prodLog[0].alerts&&prodLog[0].alerts.length>0){
    var pa=prodLog[0];
    h+='<div class="chart-card full" style="background:var(--bg2);border:1px solid rgba(240,79,79,0.3);border-radius:var(--radius);padding:16px;margin-bottom:12px;">';
    h+='<div class="chart-title" style="color:var(--red);">Production alerts — '+pa.date+' ('+pa.alerts.length+' product(s) below plan)</div>';
    // Summary bar
    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">';
    h+='<div style="background:#1e2535;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">PROJECTION</div><div style="font-size:16px;font-weight:700;color:var(--amber);">'+(pa.totalProjection||0)+' kg</div></div>';
    h+='<div style="background:#1e2535;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">PLAN</div><div style="font-size:16px;font-weight:700;color:var(--blue);">'+(pa.totalPlan||0)+' kg</div></div>';
    h+='<div style="background:#1e2535;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">PRODUCTION</div><div style="font-size:16px;font-weight:700;color:var(--green);">'+(pa.totalQty||0)+' kg</div></div>';
    h+='<div style="background:#1e2535;border-radius:8px;padding:10px;text-align:center;"><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">DISPATCH</div><div style="font-size:16px;font-weight:700;color:var(--teal);">'+(pa.totalDispatch||0)+' kg</div></div>';
    h+='</div>';
    // Alert rows
    pa.alerts.forEach(function(a){
      var pct=a.pct||0;
      var barColor=pct<50?'var(--red)':pct<80?'var(--amber)':'var(--green)';
      h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      h+='<span style="font-size:13px;font-weight:500;color:var(--text);">'+a.product+'</span>';
      h+='<span style="font-size:12px;color:var(--red);font-weight:600;">Gap: -'+a.gap+' kg ('+pct+'% achieved)</span>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:8px;">';
      h+='<div style="flex:1;background:var(--bg3);border-radius:4px;height:6px;">';
      h+='<div style="width:'+Math.min(100,pct)+'%;background:'+barColor+';height:6px;border-radius:4px;"></div></div>';
      h+='<span style="font-size:11px;color:var(--text2);white-space:nowrap;">Plan: '+a.plan+' | Actual: '+a.actual+'</span>';
      h+='</div></div>';
    });
    h+='</div>';
  }

  h+='<div class="chart-card full" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;"><div class="chart-title">All active alerts — all departments</div>';
  DEPTS.forEach(function(d){
    d.alerts.filter(function(a){return a.tp!=='green';}).forEach(function(a){
      var dc=a.tp==='red'?'var(--red)':'var(--amber)';
      h+='<div class="alert-item '+a.tp+'"><div class="alert-dot" style="background:'+dc+'"></div><span style="color:var(--text2);min-width:90px;font-size:11px;flex-shrink:0;">'+d.name+'</span><span>'+a.m+'</span></div>';
    });
  });
  h+='</div>';
  document.getElementById('mc').innerHTML=h;
}

buildTabs();
render();
